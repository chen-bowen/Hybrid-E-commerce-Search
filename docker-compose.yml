# Two-Stage Search Pipeline: Stage 1 Retrieval +Stage 2 Reranking
#
# Meta-repo: run ./scripts/setup_deps.sh first to clone backend repos into deps/.
# Then: docker compose up --build
#
# Override for local dev with sibling repos:
#   INSTACART_CONTEXT=../Instacart_Personalization ESCI_CONTEXT=../Amazon_Search_Retrieval docker compose up

services:
  stage-1-api:
    build:
      context: ${INSTACART_CONTEXT:-./deps/stage-1}
      dockerfile: Dockerfile
    container_name: stage-1-api
    environment:
      MODEL_DIR: chenbowen184/instacart-two-tower-sbert
      CORPUS_PATH: /app/processed/p5_mp20_ef0.1/eval_corpus.json
      CORPUS_HF_REPO: chenbowen184/product-artifacts
      CORPUS_HF_REPO_TYPE: dataset
      INFERENCE_DEVICE: cpu
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${INSTACART_MODELS:-./deps/stage-1/models}:/app/models
      - ${INSTACART_PROCESSED:-./deps/stage-1/processed}:/app/processed
      - ${INSTACART_DATA:-./deps/stage-1/data}:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  stage-2-api:
    build:
      context: ${ESCI_CONTEXT:-./deps/stage-2}
      dockerfile: Dockerfile
    container_name: stage-2-api
    environment:
      # Use the HF repo id directly so the reranker downloads the correct snapshot.
      MODEL_PATH: chenbowen184/amazon-multitask-reranker
      INFERENCE_DEVICE: cpu
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${ESCI_CHECKPOINTS:-./deps/stage-2/checkpoints/multi_task_reranker}:/app/checkpoints/multi_task_reranker:ro
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: two-stage-orchestrator
    environment:
      STAGE_1_URL: http://stage-1-api:8000
      STAGE_2_URL: http://stage-2-api:8000
    depends_on:
      stage-1-api:
        condition: service_healthy
      stage-2-api:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      orchestrator:
        condition: service_healthy

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "7860:7860"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - orchestrator
