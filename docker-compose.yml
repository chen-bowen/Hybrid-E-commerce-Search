# Two-Stage Search Pipeline: Instacart retrieval + ESCI reranking
#
# Meta-repo: run ./scripts/setup_deps.sh first to clone backend repos into deps/.
# Then: docker compose up --build
#
# Override for local dev with sibling repos:
#   INSTACART_CONTEXT=../Instacart_Personalization ESCI_CONTEXT=../Amazon_Search_Retrieval docker compose up

services:
  instacart-api:
    build:
      context: ${INSTACART_CONTEXT:-./deps/instacart}
      dockerfile: Dockerfile
    container_name: instacart-api
    environment:
      MODEL_DIR: /app/models/two_tower_sbert/final
      CORPUS_PATH: /app/processed/p5_mp20_ef0.1/eval_corpus.json
      INFERENCE_DEVICE: cpu
    volumes:
      - ${INSTACART_MODELS:-./deps/instacart/models}:/app/models
      - ${INSTACART_PROCESSED:-./deps/instacart/processed}:/app/processed
      - ${INSTACART_DATA:-./deps/instacart/data}:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  esci-api:
    build:
      context: ${ESCI_CONTEXT:-./deps/esci}
      dockerfile: Dockerfile
    container_name: esci-api
    environment:
      MODEL_PATH: /app/checkpoints/multi_task_reranker
      INFERENCE_DEVICE: cpu
    volumes:
      - ${ESCI_CHECKPOINTS:-./deps/esci/checkpoints/multi_task_reranker}:/app/checkpoints/multi_task_reranker:ro
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: two-stage-orchestrator
    environment:
      INSTACART_URL: http://instacart-api:8000
      ESCI_URL: http://esci-api:8000
    depends_on:
      instacart-api:
        condition: service_healthy
      esci-api:
        condition: service_healthy
    ports:
      - "8080:8080"
