server {
    listen 7860;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $frontend_upstream frontend:80;
    set $orchestrator_upstream orchestrator:8080;

    # Always proxy UI traffic to the frontend service.
    location / {
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route /api calls to orchestrator directly (as a fallback)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy common backend entrypoints so the Space isn't "blank" on `/docs`.
    location /docs {
        proxy_pass http://$orchestrator_upstream;
    }
    location /redoc {
        proxy_pass http://$orchestrator_upstream;
    }
    location = /openapi.json {
        proxy_pass http://$orchestrator_upstream/openapi.json;
    }
    location = /health {
        proxy_pass http://$orchestrator_upstream/health;
    }
    location = /ready {
        proxy_pass http://$orchestrator_upstream/ready;
    }
}
